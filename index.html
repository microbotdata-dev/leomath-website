<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Microbot Apps 🦁📱</title>
  <meta name="description" content="Aplicații educaționale făcute cu ❤️ de Microbot">
  <link rel="icon" href="https://raw.githubusercontent.com/microbotdata-dev/leomath-website/main/leomath/assets/logo.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a0a3c 0%, #4a2c7a 50%, #1a0a3c 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 40px 20px;
    }
    .logo {
      font-size: 80px;
      margin-bottom: 20px;
    }
    h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      margin-bottom: 16px;
      background: linear-gradient(135deg, #ffd93d 0%, #ff6b35 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .subtitle {
      font-size: 1.3rem;
      color: rgba(255,255,255,0.8);
      margin-bottom: 48px;
    }
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 24px;
      max-width: 800px;
      margin: 0 auto 48px;
    }
    .app-card {
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 24px;
      padding: 32px 24px;
      transition: all 0.3s ease;
      text-decoration: none;
      color: inherit;
    }
    .app-card:hover {
      transform: translateY(-8px);
      background: rgba(255,255,255,0.15);
      border-color: rgba(255,255,255,0.4);
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .app-icon {
      font-size: 64px;
      margin-bottom: 16px;
    }
    .app-card h2 {
      font-size: 1.5rem;
      margin-bottom: 8px;
    }
    .app-card p {
      color: rgba(255,255,255,0.7);
      font-size: 0.95rem;
      line-height: 1.5;
    }
    .app-card .badge {
      display: inline-block;
      background: rgba(255,107,53,0.3);
      color: #ffd93d;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 700;
      margin-bottom: 12px;
    }
    .footer {
      margin-top: 48px;
      color: rgba(255,255,255,0.5);
      font-size: 0.9rem;
    }
    .footer a {
      color: rgba(255,255,255,0.7);
      text-decoration: none;
    }
    .footer a:hover {
      color: #ffd93d;
    }
    @media (max-width: 600px) {
      .logo { font-size: 60px; }
      h1 { font-size: 2rem; }
      .apps-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">🦁📱</div>
    <h1>Microbot Apps</h1>
    <p class="subtitle">Aplicații educaționale făcute cu ❤️ în România</p>

    <div class="apps-grid">
      <a href="leomath/" class="app-card">
        <div class="app-icon">🦁</div>
        <span class="badge">🔥 Popular</span>
        <h2>Matematică cu Leo</h2>
        <p>Învață matematica pentru clasele 2-4 cu Leo Leul! Exerciții, stele și premii.</p>
      </a>

      <a href="leomemory/" class="app-card">
        <div class="app-icon">📱</div>
        <span class="badge">✨ Nou</span>
        <h2>Leo Memory</h2>
        <p>Memorază numerele de telefon ale contactelor tale prin quiz-uri interactive.</p>
      </a>
    </div>

    <div class="footer">
      <p>© 2026 <a href="mailto:microbot.data@gmail.com">Microbot</a></p>
    </div>
  </div>
</body>
</html>
